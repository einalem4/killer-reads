name = "killer-reads"
main = "src/index.js"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "killer-reads-db"
database_id = "3016975d-4150-4b6f-b123-95c8f20bae07"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "killer-reads-images"

[vars]
SERVICE_URL = "https://killer-reads.npc-labs.workers.dev"

# Secrets (set with `wrangler secret put <NAME>`, not stored here):
#   SESSION_SECRET      - random string used to sign session cookies
#   SENDGRID_API_KEY     - SendGrid API key used for password-reset emails
